version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: voiceflow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: voiceflow
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: voiceflow-redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./backend
    container_name: voiceflow-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  celery-worker:
    build:
      context: ./backend
    container_name: voiceflow-worker
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  celery-beat:
    build:
      context: ./backend
    container_name: voiceflow-beat
    command: celery -A app.core.celery_app.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  livekit-agent:
    build:
      context: ./livekit_agents
    container_name: voiceflow-livekit-agent
    command: python agent.py dev
    volumes:
      - ./livekit_agents:/app
    env_file:
      - backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - BACKEND_URL=http://backend:8000
      - INTERNAL_API_KEY=system_internal_secret
    depends_on:
      redis:
        condition: service_started
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: voiceflow-frontend
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
