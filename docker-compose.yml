version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: voiceflow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: voiceflow
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: voiceflow-redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data

  livekit:
    image: livekit/livekit:latest
    container_name: voiceflow-livekit
    command: ["--dev", "--keys", "devkey: lk_api_secret_32_characters_long_for_security"]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50050:50000-50050/udp"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7880/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
    container_name: voiceflow-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=voiceflow
      - REDIS_HOST=redis
      - LIVEKIT_URL=http://livekit:7880
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=lk_api_secret_32_characters_long_for_security
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      livekit:
        condition: service_healthy

  celery-worker:
    build:
      context: ./backend
    container_name: voiceflow-worker
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - POSTGRES_SERVER=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=voiceflow
      - REDIS_HOST=redis
      - LIVEKIT_URL=http://livekit:7880
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=lk_api_secret_32_characters_long_for_security
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      livekit:
        condition: service_healthy

  celery-beat:
    build:
      context: ./backend
    container_name: voiceflow-beat
    command: celery -A app.core.celery_app.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - POSTGRES_SERVER=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=voiceflow
      - REDIS_HOST=redis
      - LIVEKIT_URL=http://livekit:7880
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=lk_api_secret_32_characters_long_for_security
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      livekit:
        condition: service_healthy

  livekit-agent:
    build:
      context: ./livekit_agents
    container_name: voiceflow-livekit-agent
    command: python agent.py dev
    volumes:
      - ./livekit_agents:/app
    environment:
      - REDIS_URL=redis://redis:6379/0
      - BACKEND_URL=http://backend:8000
      - INTERNAL_API_KEY=system_internal_secret
      - LIVEKIT_URL=http://livekit:7880
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=lk_api_secret_32_characters_long_for_security
    depends_on:
      redis:
        condition: service_started
      backend:
        condition: service_started
      livekit:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: voiceflow-frontend
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
